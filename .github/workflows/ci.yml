name: CI

on:
  push:
    branches: [main, release/*]
  pull_request:
    branches: [main]

jobs:
  linux:
    name: Linux x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libboost-all-dev \
            libssl-dev \
            libgtest-dev \
            libgmock-dev

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

  windows:
    name: Windows ${{ matrix.arch }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            triplet: x64-windows
            cmake_arch: x64
          - arch: x86
            triplet: x86-windows
            cmake_arch: Win32

    env:
      # Force classic (non-manifest) vcpkg mode so `vcpkg install <pkgs>`
      # and the CMake toolchain integration both ignore vcpkg.json.
      VCPKG_FEATURE_FLAGS: -manifests
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
      # The runner image's vcpkg may have GHA binary caching enabled,
      # which needs ACTIONS_RUNTIME_TOKEN / ACTIONS_CACHE_URL (not
      # exposed to plain `run:` steps). Disable it to avoid the
      # "GHA binary source requires ACTIONS_RUNTIME_TOKEN" error.
      VCPKG_BINARY_SOURCES: clear

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Install vcpkg packages
        shell: cmd
        run: |
          "%VCPKG_INSTALLATION_ROOT%\vcpkg.exe" install ^
            boost-algorithm ^
            boost-asio ^
            boost-beast ^
            boost-locale ^
            boost-system ^
            boost-uuid ^
            gtest ^
            openssl ^
            --triplet %VCPKG_DEFAULT_TRIPLET%

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A ${{ matrix.cmake_arch }} ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_INSTALLATION_ROOT%\scripts\buildsystems\vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure
