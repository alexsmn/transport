name: CI

on:
  push:
    branches: [main, release/*]
  pull_request:
    branches: [main]

jobs:
  linux:
    name: Linux x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libboost-all-dev \
            libssl-dev \
            libgtest-dev \
            libgmock-dev

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure

  windows:
    name: Windows ${{ matrix.arch }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            triplet: x64-windows
            cmake_arch: x64
          - arch: x86
            triplet: x86-windows
            cmake_arch: Win32

    env:
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
      # Enable vcpkg's GitHub Actions binary cache. Requires
      # ACTIONS_RUNTIME_TOKEN and ACTIONS_CACHE_URL, which GitHub only
      # injects into JS actions; the "Expose GitHub Actions cache env"
      # step below re-exports them so the vcpkg install step can read
      # them.
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Align VCPKG_ROOT with runner vcpkg
        shell: bash
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"

      - name: Expose GitHub Actions cache env
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install vcpkg manifest dependencies
        shell: cmd
        run: |
          "%VCPKG_INSTALLATION_ROOT%\vcpkg.exe" install ^
            --triplet %VCPKG_DEFAULT_TRIPLET% ^
            --x-manifest-root=%GITHUB_WORKSPACE% ^
            --x-install-root=%GITHUB_WORKSPACE%\vcpkg_installed

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A ${{ matrix.cmake_arch }} ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_INSTALLATION_ROOT%\scripts\buildsystems\vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --build-config Release --output-on-failure
